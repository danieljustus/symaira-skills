version: 2

project_name: symaira-skills

before:
  hooks:
    - go mod tidy

builds:
  - id: symskills
    main: ./cmd/symskills
    binary: symskills
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    hooks:
      post:
        - cmd: |
            if [ "{{ .Os }}" = "darwin" ] && [ -n "${CODESIGN_IDENTITY:-}" ]; then
              codesign -s "$CODESIGN_IDENTITY" --timestamp --options runtime "{{ .Path }}"
              echo "Signed {{ .Path }}"
            fi

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: danieljustus
    name: symaira-skills
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - name: symskills
    repository:
      owner: danieljustus
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/danieljustus/symaira-skills
    description: Portable Skill SSOT manager for local AI agent harnesses
    license: Apache-2.0
    test: |
      system "#{bin}/symskills", "version"
