name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test -race ./...

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt diff found:"
            gofmt -l .
            exit 1
          fi

      - name: Build
        run: go build -o symskills ./cmd/symskills

  publish:
    name: Publish Artifacts
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build for Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o symskills-linux-amd64 ./cmd/symskills

      - name: Build for Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o symskills-linux-arm64 ./cmd/symskills

      - name: Build for macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -o symskills-darwin-amd64 ./cmd/symskills

      - name: Build for macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -o symskills-darwin-arm64 ./cmd/symskills

      - name: Build for Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o symskills-windows-amd64.exe ./cmd/symskills

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            symskills-linux-amd64
            symskills-linux-arm64
            symskills-darwin-amd64
            symskills-darwin-arm64
            symskills-windows-amd64.exe
